openapi: 3.1.0
info:
  title: Photo Dedup Desktop Sidecar API
  version: 0.1.0
  summary: Local REST contract for the Electron-managed Python sidecar.
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "49152"
        description: Random loopback port selected at sidecar startup.
security:
  - PdToken: []
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Sidecar health check.
      responses:
        "200":
          description: Sidecar is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /scan:
    post:
      operationId: startScan
      summary: Start a scan job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "202":
          description: Scan accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
  /scan/{id}:
    get:
      operationId: getScan
      summary: Get scan job status.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Scan status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /scan/{id}/cancel:
    post:
      operationId: cancelScan
      summary: Request scan cancellation.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "202":
          description: Cancellation requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /groups:
    get:
      operationId: listGroups
      summary: List duplicate groups.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, group_size, reclaimable_bytes, similarity, quality]
            default: reclaimable_bytes
        - name: status
          in: query
          schema:
            type: string
            enum: [unresolved, processed, all]
            default: unresolved
        - name: include
          in: query
          description: Set to details to return each item as a full group detail with images.
          schema:
            type: string
            enum: [details]
        - name: min_size
          in: query
          schema:
            type: integer
            minimum: 2
        - name: max_size
          in: query
          schema:
            type: integer
            minimum: 2
        - name: min_similarity
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 100
      responses:
        "200":
          description: Group page.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/GroupListResponse"
                  - $ref: "#/components/schemas/GroupDetailListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /groups/{id}:
    get:
      operationId: getGroup
      summary: Get group detail.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Group detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /images/{id}:
    patch:
      operationId: updateImage
      summary: Update image state.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImagePatchRequest"
      responses:
        "200":
          description: Updated image.
          content:
            application/json:
              schema:
                type: object
                required: [image]
                properties:
                  image:
                    $ref: "#/components/schemas/Image"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /groups/{id}/action:
    post:
      operationId: applyGroupAction
      summary: Apply a group-level mark action.
      description: Updates image marks in the group. The group checkbox state is derived from image marks and is not stored separately.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupActionRequest"
      responses:
        "200":
          description: Updated group and image marks.
          content:
            application/json:
              schema:
                type: object
                required: [group, images]
                properties:
                  group:
                    $ref: "#/components/schemas/Group"
                  images:
                    type: array
                    items:
                      $ref: "#/components/schemas/Image"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /apply:
    post:
      operationId: applyMarkedDeletes
      summary: Apply delete-marked photos.
      description: Starts a cleanup job for images whose mark is delete. When group_ids is omitted, all delete-marked images are included for backward compatibility. Trash mode delegates the actual Windows Trash move to Electron main shell.trashItem.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyRequest"
      responses:
        "202":
          description: Cleanup accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnsafePath"
  /cleanup/{id}:
    get:
      operationId: getCleanup
      summary: Get cleanup job status.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cleanup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /restore:
    post:
      operationId: restoreQuarantine
      summary: Restore quarantined files.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
      responses:
        "200":
          description: Restore result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnsafePath"
  /thumbs/{image_id}:
    get:
      operationId: getThumb
      summary: Get or create a thumbnail.
      parameters:
        - name: image_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Thumbnail bytes.
          headers:
            X-PD-Thumb-Cache:
              schema:
                type: string
                enum: [hit, miss]
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings:
    get:
      operationId: getSettings
      summary: Get sidecar settings.
      responses:
        "200":
          description: Settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: putSettings
      summary: Replace sidecar settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /cache/info:
    get:
      operationId: getCacheInfo
      summary: Get group snapshot cache information.
      responses:
        "200":
          description: Cache information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /cache/clear:
    post:
      operationId: clearCache
      summary: Clear group snapshot cache files.
      responses:
        "200":
          description: Removed snapshot count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheClearResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    PdToken:
      type: apiKey
      in: header
      name: X-PD-Token
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsafePath:
      description: Path failed safety validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
    HealthResponse:
      type: object
      required: [status, version, db_path, thumbs_dir]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        db_path:
          type: string
        thumbs_dir:
          type: string
    ScanRequest:
      type: object
      required: [roots]
      properties:
        roots:
          type: array
          minItems: 1
          items:
            type: string
        recursive:
          type: boolean
          default: true
        extensions:
          type: array
          items:
            type: string
          default: [jpg, jpeg, png, heic, webp]
        threshold:
          type: integer
          minimum: 0
          maximum: 100
          default: 90
    StartJobResponse:
      type: object
      required: [scan_id, status]
      properties:
        scan_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatusValue"
    ScanStatus:
      type: object
      required: [scan_id, status, phase, done, total, cancellable]
      properties:
        scan_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatusValue"
        phase:
          type: string
          enum: [collecting, scanning, thumbnails, grouping, done, error]
        done:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        eta_sec:
          type: integer
          minimum: 0
          nullable: true
        cancellable:
          type: boolean
        summary:
          type: object
          additionalProperties: true
          nullable: true
    JobStatusValue:
      type: string
      enum: [queued, running, cancel_requested, done, error, cancelled]
    Group:
      type: object
      required: [id, member_count, selection_state, reclaimable_bytes]
      properties:
        id:
          type: integer
        member_count:
          type: integer
        recommended_keep_image_id:
          type: integer
          nullable: true
        selection_state:
          type: string
          description: Derived from image marks; not stored as group state.
          enum: [recommended_applied, keep_all, delete_all, mixed]
        max_similarity:
          type: number
          nullable: true
        reclaimable_bytes:
          type: integer
        thumbnail_image_id:
          type: integer
          nullable: true
        cover_image_id:
          type: integer
          nullable: true
        marked_count:
          type: integer
        total_count:
          type: integer
    Image:
      type: object
      required: [id, path, size_bytes, mark, recommended_keep]
      example:
        id: 42
        path: "D:\\Photos\\IMG_0420.HEIC"
        size_bytes: 3988123
        width: 4032
        height: 3024
        format: heic
        quality_score: 91.4
        mark: keep
        recommended_keep: true
        is_quarantined: false
      properties:
        id:
          type: integer
        path:
          type: string
        size_bytes:
          type: integer
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        format:
          type: string
          nullable: true
        quality_score:
          type: number
          nullable: true
        sharpness:
          type: number
          nullable: true
        taken_at:
          type: string
          nullable: true
        mark:
          type: string
          enum: [keep, delete, none]
          default: none
        recommended_keep:
          type: boolean
        is_quarantined:
          type: boolean
          default: false
    GroupListResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Group"
        next_cursor:
          type: string
          nullable: true
        total_estimate:
          type: integer
          nullable: true
    GroupDetailListResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroupDetailResponse"
        next_cursor:
          type: string
          nullable: true
        total_estimate:
          type: integer
          nullable: true
    GroupDetailResponse:
      type: object
      required: [group, images]
      properties:
        group:
          $ref: "#/components/schemas/Group"
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
    ImagePatchRequest:
      type: object
      required: [mark]
      example:
        mark: delete
      properties:
        mark:
          type: string
          enum: [keep, delete, none]
      additionalProperties: false
    GroupActionRequest:
      type: object
      required: [action]
      examples:
        recommended:
          value:
            action: apply_recommended
        keepAll:
          value:
            action: keep_all
        deleteAll:
          value:
            action: delete_all
      properties:
        action:
          type: string
          enum: [apply_recommended, keep_all, delete_all]
    ApplyRequest:
      type: object
      required: [mode]
      examples:
        trash:
          value:
            mode: trash
            group_ids: [1, 3]
        permanent:
          value:
            mode: permanent
      properties:
        mode:
          type: string
          enum: [trash, permanent]
          default: trash
        group_ids:
          type: array
          description: Optional group id allowlist. Omit to preserve the legacy all-groups scope.
          items:
            type: integer
    CleanupStartResponse:
      type: object
      required: [job_id, status, targets]
      example:
        job_id: cleanup_20260712_093900
        status: queued
        targets: 264
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatusValue"
        targets:
          type: integer
    CleanupStatus:
      type: object
      required: [job_id, status, phase, done, total]
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatusValue"
        phase:
          type: string
          enum: [planning, waiting_for_trash, quarantine, db_update, done, error]
        done:
          type: integer
        total:
          type: integer
        summary:
          type: object
          additionalProperties: true
          nullable: true
    RestoreRequest:
      type: object
      properties:
        quarantine_ids:
          type: array
          items:
            type: integer
        restore_all:
          type: boolean
          default: false
    RestoreResponse:
      type: object
      required: [restored, failed]
      properties:
        restored:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string
    Settings:
      type: object
      required: [threshold, recursive, extensions, cleanup_mode]
      properties:
        threshold:
          type: integer
          minimum: 0
          maximum: 100
          default: 90
        recursive:
          type: boolean
          default: true
        extensions:
          type: array
          items:
            type: string
        cleanup_mode:
          type: string
          enum: [trash, permanent]
          default: trash
    CacheInfo:
      type: object
      required: [cache_dir, snapshot_count, snapshot_bytes]
      properties:
        cache_dir:
          type: string
        snapshot_count:
          type: integer
        snapshot_bytes:
          type: integer
    CacheClearResponse:
      type: object
      required: [removed]
      properties:
        removed:
          type: integer
